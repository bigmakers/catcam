name: CATcam
options:
  bundleIdPrefix: com.harasaki
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  CATcam:
    type: application
    platform: iOS
    sources:
      - CATcam
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Core Image の Metal カーネルをビルドするためのフラグ
        MTL_COMPILER_FLAGS: -fcikernel
        MTLLINKER_FLAGS: -cikernel
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        CODE_SIGN_STYLE: Automatic
    info:
      path: CATcam/Info.plist
      properties:
        CFBundleDisplayName: CATcam
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: 写真を撮影するためにカメラを使用します。
        NSLocationWhenInUseUsageDescription: 写真に撮影場所を記録するために位置情報を使用します。
        NSPhotoLibraryAddUsageDescription: 撮影した写真をフォトライブラリに保存します。
