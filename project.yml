name: CATcam
options:
  bundleIdPrefix: com.harasaki
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  CATcam:
    type: application
    platform: iOS
    sources:
      - CATcam
    settings:
      base:
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Core Image の Metal カーネルをビルドするためのフラグ
        MTL_COMPILER_FLAGS: -fcikernel
        MTLLINKER_FLAGS: -cikernel
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        CODE_SIGN_STYLE: Automatic
    info:
      path: CATcam/Info.plist
      properties:
        CFBundleDisplayName: CATcam
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "猫を検出して頭数を数え、地名・地図とともに写真へ記録するためにカメラを使用します。例:猫にカメラを向けると頭数が表示され、シャッターを押すと「ここで2匹見つけた」と地名つきで写真に焼き込まれます。"
        NSLocationWhenInUseUsageDescription: "猫を見つけた場所の地名と座標を写真や地図に記録するために位置情報を使用します。例:撮影場所が「Tokyo, Japan / 35.68°N, 139.69°E」として写真に焼き込まれます。"
        NSPhotoLibraryAddUsageDescription: "猫の頭数や地名・地図を焼き込んで作成した写真をフォトライブラリに保存するために使用します。例:シャッター後、加工済みの一枚がカメラロールに追加されます。"
